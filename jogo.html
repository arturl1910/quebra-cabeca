<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inquebrável - Jogo</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-dark text-white">
  <div class="container py-4 text-center">
    <h1 class="mb-3">Inquebrável - Quebra-Cabeça</h1>

    <div class="row justify-content-center mb-3">
      <div class="col-auto"><h4>Tempo: <span id="tempo">05:00</span></h4></div>
      <div class="col-auto"><h4>Pontos: <span id="pontos">0</span></h4></div>
    </div>

    <div class="mb-3">
      <button id="btnPausar" class="btn btn-warning" onclick="pausar()">Pausar</button>
      <button class="btn btn-info" onclick="iniciarPartida()">Reiniciar</button>
      <button class="btn btn-light" onclick="voltarInicio()">Voltar ao início</button>
    </div>

    <div id="puzzle" class="puzzle mx-auto"></div>

    <h3 id="mensagem" class="mt-3"></h3>
  </div>

  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
